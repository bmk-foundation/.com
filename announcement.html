<script>
const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    // Show sidebar and hide hamburger
    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      sidebar.classList.add('active');
      overlay.classList.add('active');
      menuToggle.classList.add('active');
      menuToggle.classList.add('hidden');
    });

    // Close sidebar and show hamburger when clicking outside
    function closeSidebar() {
      sidebar.classList.remove('active');
      overlay.classList.remove('active');
      menuToggle.classList.remove('active');
      menuToggle.classList.remove('hidden');
    }

    overlay.addEventListener('click', closeSidebar);

    document.addEventListener('click', (e) => {
      if (
        !sidebar.contains(e.target) &&
        !menuToggle.contains(e.target)
      ) {
        closeSidebar();
      }
    });

    // Prevent closing if clicking inside sidebar
    sidebar.addEventListener('click', (e) => {
      e.stopPropagation();
    });
const sheetURL = 'https://script.google.com/macros/s/AKfycbx_dQp-yWzQLPScOdgbKgtH1fGp4yio32fWvcJQBZAqmmF_bTU6kqp_Zy_sH9IepX4E/exec?action=announcements';
    const loading = document.getElementById('loading');
    const container = document.getElementById('announcements');

    fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    const loader = document.getElementById('loading');
    loader.style.opacity = '0'; // স্মুথ ফেইড আউট
    setTimeout(() => {
        loader.style.display = 'none';
        container.style.display = 'flex';
    }, 500);

    // আপনার বাকি কোড...


        data.reverse().forEach(item => {
          const card = document.createElement('div');
          card.className = 'announcement-card';
          card.innerHTML = `
            <div class="announcement-title">${item.title}</div>
            <div class="announcement-date">🗓️ ${item.date}</div>
            <div class="announcement-message">${item.message}</div>
          `;

          card.addEventListener('click', () => {
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalDate').innerText = '🗓️ ' + item.date;
            document.getElementById('modalMessage').innerText = item.message;
            document.getElementById('modalOverlay').style.display = 'flex';
          });

          container.appendChild(card);
        });
      })
      .catch(err => {
        loading.innerText = "❌ ডেটা লোড করতে সমস্যা হয়েছে। অনুগ্রহ করে পরে আবার চেষ্টা করুন।";
        console.error(err);
      });

    // Modal বন্ধ
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target.id === 'modalOverlay') {
        this.style.display = 'none';
      }
    });
</script>
