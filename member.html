<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>সদস্য তালিকা | BMKF</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="member.css" />
</head>
<body>

  <section class="members-section">
    <div class="header-container">
      <h1><i class="fas fa-users"></i> আমাদের সদস্য তালিকা</h1>
      <p>ফাউন্ডেশনের একনিষ্ঠ প্রাণশক্তি এবং গর্বিত সদস্যবৃন্দ</p>
    </div>

    <div class="controls">
      <div class="custom-select">
        <i class="fas fa-filter"></i>
        <select id="filterType">
          <option value="all">সব ক্যাটাগরি</option>
          <option value="core">মূল সদস্য</option>
          <option value="active">সক্রিয় সদস্য</option>
          <option value="volunteer">স্বেচ্ছাসেবক</option>
        </select>
      </div>

      <div class="custom-select">
        <i class="fas fa-sort-amount-down"></i>
        <select id="sortBy">
          <option value="newest">নতুন ক্রমানুসারে</option>
          <option value="name">নাম অনুযায়ী</option>
        </select>
      </div>
    </div>

    <div id="membersGrid" class="members-grid"></div>

    <div class="pagination-container">
      <button class="page-btn" onclick="prevPage()"><i class="fas fa-chevron-left"></i> পূর্ববর্তী</button>
      <div class="page-indicator">পৃষ্ঠা <span id="currentPage">1</span></div>
      <button class="page-btn" onclick="nextPage()">পরবর্তী <i class="fas fa-chevron-right"></i></button>
    </div>
  </section>

  <div id="memberModal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="member.js"></script>
</body>
</html>
