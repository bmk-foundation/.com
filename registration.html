      <p style="font-weight: normal;">আল্লাহর সন্তুষ্টির জন্য সমষ্টিগতভাবে সহযোগিতায় যুক্ত হোন</p>

  <div class="wrapper">
    <div class="animated-border">
      <div class="form-container">
        <h2>সদস্য রেজিস্ট্রেশন ফর্ম</h2>
        <form id="registrationForm">
          <div class="input-group">
            <input type="text" name="name" placeholder=" " required />
            <label><i class="fa-regular fa-circle-user"></i> আপনার সম্পূর্ণ নাম</label>
          </div>
          <div class="input-group">
            <input type="email" name="email" placeholder=" " required />
            <label><i class="fa-regular fa-envelope"></i> ইমেইল</label>
          </div>
          <div class="input-group">
            <input type="tel" name="phone" placeholder=" " required />
            <label><i class="fa-solid fa-phone"></i> ফোন নাম্বার</label>
          </div>
          <div class="input-group">
            <input type="file" accept="image/*" id="photoInput" required />
            <label style="top: 0px;"><i class="fa-regular fa-image"></i> ছবি দিন</label>
          </div>
          <button type="submit" id="submitBtn">রেজিস্টার করুন</button>
        </form>
        <div class="msg" id="responseMsg"></div>
      </div>
    </div>
  </div>
